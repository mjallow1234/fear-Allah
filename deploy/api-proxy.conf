server {
    listen 80;
    server_name _;

    location /api/ {
        # Handle preflight OPTIONS requests at nginx level
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # Allow larger request bodies than the app limit so the backend can return
        # a JSON 413 response with a proper error message. Backend enforces 50MB.
        client_max_body_size 100M;

        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /socket.io/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Socket.IO specific timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── PWA: manifest MIME type + no-cache ───────────────────────────────────
    # nginx:alpine's built-in mime.types has no entry for .webmanifest, so
    # nginx falls back to application/octet-stream.  Safari validates
    # Content-Type before parsing the manifest; application/octet-stream causes
    # Safari to silently discard it, breaking standalone launch and home-screen
    # icon on iOS.  This block overrides the MIME type and disables caching so
    # Safari always fetches the latest manifest after a redeploy.
    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        default_type application/manifest+json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── PWA: service worker must never be cached by the browser ──────────────
    # If sw.js is served from a stale cache the browser continues running the
    # old service worker indefinitely, preventing app updates.
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    # ── Vite hashed assets: immutable long-cache ─────────────────────────────
    # Vite appends a content hash to every JS/CSS bundle (e.g.
    # /assets/index-7pZRNauJ.js).  These filenames change whenever the content
    # changes, so it is safe to cache them forever — the browser will fetch a
    # new filename on the next deployment.
    location ~* ^/assets/.+\.(js|css|woff2?|png|svg|ico)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}
