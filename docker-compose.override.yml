version: "3.8"

services:
  backend:
    volumes:
      - ./backend:/app:cached
    environment:
      PYTHONUNBUFFERED: 1
      ENABLE_RELOAD: 0
    command: /app/scripts/dev-entrypoint.sh
    # backend is accessed by other containers using the internal network (no host port published)

  frontend:
    image: fear-allah-frontend-dev
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-slim
        RUN apt-get update && apt-get install -y python3 make g++ && rm -rf /var/lib/apt/lists/*
    volumes:
      - ./frontend:/app:cached
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      # Inside Docker, reach api-proxy via its service name instead of localhost:18002
      VITE_PROXY_TARGET: http://api-proxy:80
    command: sh -c "npm ci --silent && npm run dev -- --host 0.0.0.0"

  api-proxy:
    image: nginx:alpine
    volumes:
      - ./deploy/api-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "18002:80"
    depends_on:
      - backend
